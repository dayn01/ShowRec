# Cloudflare Tunnel — exposes ShowRec to the internet securely (no open ports).
#
#   1. Create a tunnel in the Cloudflare Zero Trust dashboard (see CLOUDFLARE.md)
#   2. Put its token in .env as:   TUNNEL_TOKEN=eyJ...
#   3. Run:  docker compose -f docker-compose.yml -f docker-compose.cloudflare.yml up -d
#
# The tunnel connects out to Cloudflare, so you do NOT need to forward any ports
# or publish 8087. (You can even remove the "ports:" mapping from the frontend.)
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: showrec-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - showrec
