server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container (strips the /api prefix)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;   # AI/recommendation builds can be slow
    }

    # Serve the PWA manifest with the correct MIME type
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # SPA — serve index.html for any unknown route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
